name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check llm_stress
      - name: Import smoke
        run: |
          # The package must import and the CLI must build its parser without a server.
          python -c "import llm_stress, llm_stress.runner, llm_stress.client, llm_stress.metrics"
          python -m llm_stress --help
          python -m llm_stress run --help
